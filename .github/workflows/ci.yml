name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 23
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run check
      - run: npm run build

  fly-smoke-test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t papers-web:smoke .
      - name: Start container
        run: |
          docker run -d --name papers-smoke -p 3000:3000 papers-web:smoke
          # wait for the server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/papers/api/health; then
              echo " Health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30s"
          docker logs papers-smoke
          exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f papers-smoke || true
